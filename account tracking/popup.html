<!doctype html>
<html>
  <body>
    <button id="start">Block Followers</button>
    <button id="stop">Stop</button>
    <label style="display: block; margin-top: 10px">
      <input type="checkbox" id="toggle-blocking" /> Enable Tab Closing
    </label>
    <label style="display: block; margin-top: 10px">
      Max Blocks:
      <input
        type="number"
        id="max-blocks"
        min="1"
        value="15"
        style="width: 60px"
      />
    </label>
    <div id="counter">Total blocked: 0</div>
    <div id="account-block-list" style="margin-top: 10px"></div>
    <script src="popup.js"></script>
  </body>
</html>
